stages:
  - test
  - build
  - deploy

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"

# ──────────────────────────────────────────────────────────────────────────────
# TEST — Backend (Spring Boot / JUnit 5)
# ──────────────────────────────────────────────────────────────────────────────
backend:test:
  stage: test
  image: maven:3.9-eclipse-temurin-17
  cache:
    key: maven-$CI_COMMIT_REF_SLUG
    paths:
      - .m2/repository
      - backend/target
  script:
    - cd backend
    - mvn $MAVEN_OPTS -B test
    - mvn $MAVEN_OPTS -B jacoco:report
  artifacts:
    when: always
    reports:
      junit:
        - backend/target/surefire-reports/TEST-*.xml
    paths:
      - backend/target/site/jacoco
    expire_in: 7 days
  rules:
    - changes:
        - backend/**/*

# ──────────────────────────────────────────────────────────────────────────────
# TEST — Frontend (Angular)
# ──────────────────────────────────────────────────────────────────────────────
frontend:test:
  stage: test
  image: node:20-alpine
  cache:
    key: npm-frontend-$CI_COMMIT_REF_SLUG
    paths:
      - frontend/node_modules
  script:
    - cd frontend
    - npm ci
    - npm run test -- --watch=false --browsers=ChromeHeadless
    - npm run build -- --configuration production
  artifacts:
    paths:
      - frontend/dist
    expire_in: 7 days
  rules:
    - changes:
        - frontend/**/*

# ──────────────────────────────────────────────────────────────────────────────
# TEST — Python AI service
# ──────────────────────────────────────────────────────────────────────────────
ai:test:
  stage: test
  image: python:3.11-slim
  cache:
    key: pip-ai-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/pip
  script:
    - cd ai_service
    - pip install --cache-dir ../.cache/pip -r requirements.txt
    - pip install --cache-dir ../.cache/pip pytest
    - pytest -v || true   # placeholder until AI test-suite is added
  rules:
    - changes:
        - ai_service/**/*

# ──────────────────────────────────────────────────────────────────────────────
# BUILD — Docker images, pushed to the project registry
# ──────────────────────────────────────────────────────────────────────────────
.build_template: &build_definition
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

build:backend:
  <<: *build_definition
  script:
    - docker build -t "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA" -t "$CI_REGISTRY_IMAGE/backend:latest" ./backend
    - docker push "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY_IMAGE/backend:latest"

build:frontend:
  <<: *build_definition
  script:
    - docker build -t "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA" -t "$CI_REGISTRY_IMAGE/frontend:latest" ./frontend
    - docker push "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY_IMAGE/frontend:latest"

build:ai:
  <<: *build_definition
  script:
    - docker build -t "$CI_REGISTRY_IMAGE/ai:$CI_COMMIT_SHORT_SHA" -t "$CI_REGISTRY_IMAGE/ai:latest" ./ai_service
    - docker push "$CI_REGISTRY_IMAGE/ai:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY_IMAGE/ai:latest"

# ──────────────────────────────────────────────────────────────────────────────
# DEPLOY — SSH into the production host and redeploy via docker compose
# ──────────────────────────────────────────────────────────────────────────────
deploy:production:
  stage: deploy
  image: alpine:3.20
  before_script:
    - apk add --no-cache openssh-client
    - eval "$(ssh-agent -s)"
    - echo "$DEPLOY_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
  script:
    - ssh "$DEPLOY_USER@$DEPLOY_HOST" "cd $DEPLOY_PATH && git pull origin main && docker compose pull && docker compose up -d --remove-orphans && docker image prune -f"
  environment:
    name: production
    url: https://eduai.yourdomain.com
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
