# OWASP ZAP configuration for EduAI LMS API security scanning

# Attack strength: LOW / MEDIUM / HIGH / INSANE
scanner.attackStrength=MEDIUM

# Alert threshold: LOW / MEDIUM / HIGH
scanner.alertThreshold=MEDIUM

# Maximum scan duration (seconds)
scanner.maxScanDurationInMins=20

# Passive scan — run on all responses
pscan.maxBodySizeInBytesToScan=10000

# Exclude health/actuator endpoints from attack
globalexcludeurl.url_list.url\(0\).regex=.*/actuator.*
globalexcludeurl.url_list.url\(0\).enabled=true
globalexcludeurl.url_list.url\(1\).regex=.*/h2-console.*
globalexcludeurl.url_list.url\(1\).enabled=true
