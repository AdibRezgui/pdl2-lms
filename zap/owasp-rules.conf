# OWASP Top 10 rule mapping for ZAP active/passive scans
# Rules enabled by default in ZAP community edition

# A01 — Broken Access Control
10094=WARN   # HTTP Parameter Pollution
10095=WARN   # Backup File Disclosure
90020=WARN   # Remote OS Command Injection
90021=WARN   # XPath Injection

# A02 — Cryptographic Failures
10017=WARN   # Cross-Domain JavaScript Source File Inclusion
10096=WARN   # Sensitive Information in URL
90033=WARN   # Loosely Scoped Cookie

# A03 — Injection
40012=WARN   # Cross Site Scripting (Reflected)
40014=WARN   # Cross Site Scripting (Persistent)
40016=WARN   # Cross Site Scripting (Persistent) — Prime
40017=WARN   # Cross Site Scripting (Persistent) — Spider
40018=WARN   # SQL Injection
40019=WARN   # SQL Injection — MySQL
40020=WARN   # SQL Injection — Hypersonic SQL
40021=WARN   # SQL Injection — Oracle
40022=WARN   # SQL Injection — PostgreSQL

# A05 — Security Misconfiguration
10038=WARN   # Content Security Policy (CSP) Header Not Set
10021=WARN   # X-Content-Type-Options Header Missing
10035=WARN   # Strict-Transport-Security Header Not Set
10036=WARN   # Server Leaks Version Information

# A07 — Identification and Authentication Failures
10105=WARN   # Weak Authentication Method
10098=WARN   # Cross-Domain Misconfiguration

# A09 — Security Logging and Monitoring Failures
40040=WARN   # CORS Misconfiguration
