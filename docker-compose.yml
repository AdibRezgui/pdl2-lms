version: '3.8'

services:

  # ── Angular Frontend (Nginx) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eduai_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - eduai_network

  # ── Spring Boot Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eduai_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=jdbc:postgresql://db:5432/eduai_db
      - POSTGRES_USER=eduai_user
      - POSTGRES_PASSWORD=eduai_pass
      - JWT_SECRET=${JWT_SECRET:-eduai-lms-super-secret-key-min-32-chars-long-change-in-prod!!}
      - AI_SERVICE_URL=http://ai_service:8000
      - CORS_ORIGINS=http://localhost,http://localhost:80,${APP_BASE_URL:-http://localhost}
      - UPLOAD_DIR=/app/uploads
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_FROM=${MAIL_FROM:-noreply@eduai.tn}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - eduai_network
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  # ── Python AI Service ─────────────────────────────────────────────────────────
  ai_service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: eduai_ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DATABASE_URL=postgresql://eduai_user:eduai_pass@db:5432/eduai_db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - eduai_network
    volumes:
      - ai_models:/app/models

  # ── PostgreSQL Database ───────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: eduai_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=eduai_user
      - POSTGRES_PASSWORD=eduai_pass
      - POSTGRES_DB=eduai_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - eduai_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eduai_user -d eduai_db"]
      interval: 10s
      timeout: 5s
      retries: 5

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  backend_uploads:
  ai_models:

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  eduai_network:
    driver: bridge
