version: '3.8'

services:
  # ── Next.js Frontend / Backend ───────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: eduai_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - DATABASE_URL=postgresql://eduai_user:eduai_pass@db:5432/eduai_db
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_SECRET=your-super-secret-key-change-in-production
      - NEXTAUTH_URL=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eduai_network
    volumes:
      - uploads:/app/public/uploads
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.eduai.rule=Host(`eduai.yourdomain.com`)"
      - "traefik.http.routers.eduai.tls=true"
      - "traefik.http.routers.eduai.tls.certresolver=letsencrypt"

  # ── PostgreSQL Database ───────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: eduai_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=eduai_user
      - POSTGRES_PASSWORD=eduai_pass
      - POSTGRES_DB=eduai_db
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - eduai_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eduai_user -d eduai_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Cache ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: eduai_redis
    restart: unless-stopped
    command: redis-server --requirepass redis_pass --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - eduai_network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "redis_pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: eduai_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
      - backend
    networks:
      - eduai_network

  # ── Spring Boot Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eduai_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=jdbc:postgresql://db:5432/eduai_db
      - POSTGRES_USER=eduai_user
      - POSTGRES_PASSWORD=eduai_pass
      - JWT_SECRET=eduai-lms-super-secret-key-min-32-chars-long-change-in-prod!!
      - AI_SERVICE_URL=http://ai_service:8000
      - CORS_ORIGINS=http://localhost:3000,https://eduai.yourdomain.com
      - UPLOAD_DIR=/app/uploads
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_FROM=${MAIL_FROM:-noreply@eduai.tn}
      - APP_BASE_URL=${APP_BASE_URL:-https://eduai.yourdomain.com}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eduai_network
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  # ── Python AI Service ─────────────────────────────────────────────────────────
  ai_service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: eduai_ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=postgresql://eduai_user:eduai_pass@db:5432/eduai_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis
    networks:
      - eduai_network
    volumes:
      - ai_models:/app/models

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local
  backend_uploads:
    driver: local
  nginx_logs:
    driver: local
  ai_models:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  eduai_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
