spring:
  application:
    name: eduai-lms-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/eduai_db}
    username: ${POSTGRES_USER:eduai_user}
    password: ${POSTGRES_PASSWORD:eduai_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 20

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@eduai.tn}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 52MB

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

app:
  jwt:
    secret: ${JWT_SECRET:eduai-lms-super-secret-key-min-32-chars-long-change-in-production}
    expiration: 86400000         # 24h
    refresh-expiration: 604800000 # 7 days

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:4200}

  ai-service:
    url: ${AI_SERVICE_URL:http://localhost:8000}

  upload:
    dir: ${UPLOAD_DIR:./uploads}

  mail:
    from: ${MAIL_FROM:noreply@eduai.tn}
    from-name: "EduAI Platform"
    base-url: ${APP_BASE_URL:http://localhost:4200}

  rate-limit:
    capacity: 30
    refill-per-minute: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false

logging:
  level:
    com.eduai: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
