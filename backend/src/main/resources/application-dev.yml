spring:
  datasource:
    url: jdbc:h2:file:./data/eduai_dev;AUTO_SERVER=TRUE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  h2:
    console:
      enabled: true
      path: /h2-console

  mail:
    host: localhost
    port: 1025
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

app:
  upload:
    dir: ./uploads-dev

  mail:
    base-url: http://localhost:4200

logging:
  level:
    com.eduai: DEBUG
    org.hibernate.SQL: DEBUG
