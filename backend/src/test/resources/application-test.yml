spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  mail:
    host: localhost
    port: 25
    username: test
    password: test

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

app:
  jwt:
    secret: test-secret-key-min-32-chars-long-for-tests
    expiration: 86400000
    refresh-expiration: 604800000
  cors:
    allowed-origins: http://localhost:4200
  ai-service:
    url: http://localhost:8000
  upload:
    dir: ./test-uploads
  mail:
    from: test@test.com
    from-name: "Test"
    base-url: http://localhost:4200
  rate-limit:
    capacity: 100
    refill-per-minute: 100
